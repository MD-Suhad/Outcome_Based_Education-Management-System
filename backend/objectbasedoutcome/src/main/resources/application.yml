server:
  port: 9081
cloud:
 discovery:
  enabled: true
eureka:
   client:
     service-url:
      defaultZone: http://localhost:8761/eureka/
      register-with-eureka: true
      fetch-registry: true

spring:
  application:
    name: obe-auth-service

  datasource:
    url: jdbc:mysql://localhost:3306/obe_auth?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: ??@@suhad@@??
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: YOUR_GOOGLE_CLIENT_ID         # ← paste from Google Console
            client-secret: YOUR_GOOGLE_CLIENT_SECRET  # ← paste from Google Console
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-name: Google

          github:
            client-id: YOUR_GITHUB_CLIENT_ID         # ← paste from GitHub Settings
            client-secret: YOUR_GITHUB_CLIENT_SECRET  # ← paste from GitHub Settings
            scope:
              - read:user
              - user:email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-name: GitHub

        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: id

  flyway:
    enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        dialect: org.hibernate.dialect.MySQL8Dialect   # ✅ updated for Hibernate 6

  jackson:
    mapper:
      default-view-inclusion: true

  mail:
    host: smtp.gmail.com
    port: 587   # ✅ correct Gmail SMTP port
    username: obe.shohaib@gmail.com
    password: shohaib
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

feign:
  hystrix:
    enabled: true

auth:
  token:
    secret: github-secret
